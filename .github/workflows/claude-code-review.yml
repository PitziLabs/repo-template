# ============================================================================
# Claude Code — Automated PR Review
# ============================================================================
# Thin wrapper around PitziLabs/shared-workflows/claude-review.yml.
# Pinned to Haiku.
#
# >>> CUSTOMIZE THE review_prompt BELOW FOR THIS REPO. <<<
# Do NOT ship the placeholder. A copy-pasted prompt that describes the wrong
# repo is worse than none — it points the reviewer at the wrong rubric. The
# good fleet examples (firewalla-axiom-pipeline, homelab-observability,
# reference-checker) each describe their OWN content.
# Also review `paths-ignore`: if markdown is this repo's product, do NOT
# ignore "*.md".
# ============================================================================

name: Claude Code Review

on:
  pull_request:
    types: [opened, synchronize, ready_for_review, reopened]
    paths-ignore:
      - "LICENSE"
      - ".gitignore"

jobs:
  claude-review:
    permissions:
      contents: read
      pull-requests: write
      issues: write
      id-token: write
    uses: PitziLabs/shared-workflows/.github/workflows/claude-review.yml@main
    secrets: inherit
    with:
      review_prompt: |
        REPLACE THIS PLACEHOLDER. Describe what THIS repository is (one or two
        sentences), then list the 4–6 dimensions the reviewer should focus on,
        each as a bolded category with a short explanation. Tailor to the
        repo's actual content (e.g. Terraform/AWS, HA YAML, bash scripts,
        markdown prose, Python). See the fleet for working examples.
